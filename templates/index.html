<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Keyword Finder</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <header class="hero">
      <h1>Keyword Finder</h1>
      <p class="tagline">Drop in a few words. 50 results per page · page count adapts to the data.</p>
    </header>

    <form id="search-form" class="card" autocomplete="off">
      <label class="field">
        <span class="label">Keywords <em>(comma-separated, or just type a phrase)</em></span>
        <input
          type="text"
          id="keywords"
          name="keywords"
          placeholder="machine learning, python, AI"
          required
          autofocus
        />
      </label>
      <button type="submit" id="submit-btn">Find pages</button>
    </form>

    <section id="status" class="status hidden" aria-live="polite"></section>

    <section id="results" class="results hidden">
      <header class="results-header">
        <h2 id="results-heading"></h2>
        <p id="results-meta" class="results-meta"></p>
      </header>
      <ul id="result-list" class="result-list"></ul>
      <nav id="pagination" class="pagination hidden" aria-label="Result pages">
        <button type="button" id="prev-btn" class="page-btn">← Previous</button>
        <span id="page-label" class="page-label">Page 1 of 1</span>
        <button type="button" id="next-btn" class="page-btn">Next →</button>
      </nav>
    </section>

    <footer class="foot">
      <span class="version-badge">build: keyword-finder-v5 · dynamic pages</span><br />
      Results sourced from DuckDuckGo's public search.
    </footer>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
